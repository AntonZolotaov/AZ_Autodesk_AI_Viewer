<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APS Viewer + AI BIM Assistant</title>

  <!-- APS Viewer -->
  <link rel="stylesheet"
        href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css"/>
  <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    #viewer { width:100%; height:calc(100vh - 120px); min-height:520px; }
    .btn { padding:.6rem .9rem; border-radius:10px; font-weight:600; }
    .btn-primary { background:#00bcd4; color:white; }
  </style>
</head>
<body class="bg-gray-50 p-4">

<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

  <!-- Viewer -->
  <div class="lg:col-span-2 bg-white rounded-xl shadow p-3">
    <div class="flex justify-between items-center mb-2">
      <div class="font-semibold">APS Viewer</div>
      <div id="viewerStatus" class="text-sm text-gray-500">Initializing...</div>
    </div>
    <div id="viewer"></div>
  </div>

  <!-- Right Panel -->
  <div class="bg-white rounded-xl shadow p-4 flex flex-col gap-4">

    <div>
      <div class="font-semibold mb-2">Load Model</div>
      <input id="urnInput"
             class="w-full border rounded p-2 text-sm"
             placeholder="Paste base64 URN here" />
      <button id="btnLoad"
              class="btn btn-primary w-full mt-2">
        Load Model
      </button>
    </div>

    <div>
      <div class="font-semibold mb-2">AI BIM Assistant</div>
      <textarea id="prompt"
                class="w-full border rounded p-2 text-sm"
                rows="3"
                placeholder="How many windows?"></textarea>

      <button id="btnAsk"
              class="btn btn-primary w-full mt-2">
        Ask AI
      </button>

      <div id="aiAnswer"
           class="mt-3 text-sm text-gray-700 whitespace-pre-wrap"></div>
    </div>

  </div>
</div>

<script>
let viewer = null;
let model = null;
let modelDataCache = [];

// ===============================
// Backend URL
// ===============================
const BACKEND = "https://revit-viewer-backend.onrender.com";

// ===============================
// APS Token
// ===============================
async function getAccessToken(onTokenReady) {
  const res = await fetch(`${BACKEND}/api/auth/token`);
  if (!res.ok) throw new Error("Token error");
  const data = await res.json();
  onTokenReady(data.access_token, data.expires_in);
}

// ===============================
// Init Viewer
// ===============================
async function initViewer() {
  return new Promise((resolve, reject) => {
    Autodesk.Viewing.Initializer({ getAccessToken }, () => {
      viewer = new Autodesk.Viewing.GuiViewer3D(
        document.getElementById("viewer")
      );
      const code = viewer.start();
      if (code > 0) reject("Viewer failed to start.");
      document.getElementById("viewerStatus").innerText = "Ready";
      resolve();
    });
  });
}

// ===============================
// Load Model
// ===============================
async function loadModel(urn) {
  if (!viewer) await initViewer();

  document.getElementById("viewerStatus").innerText = "Loading...";

  return new Promise((resolve, reject) => {
    Autodesk.Viewing.Document.load(
      "urn:" + urn,
      doc => {
        const viewable = doc.getRoot().getDefaultGeometry();
        if (!viewable) {
          alert("No geometry found. Make sure model is translated.");
          return reject();
        }

        viewer.loadDocumentNode(doc, viewable).then(m => {
          model = m;
          viewer.fitToView();
          document.getElementById("viewerStatus").innerText = "Loaded";
          resolve();
        });
      },
      (code, msg) => {
        alert("Load failed: " + code + " " + msg);
        reject();
      }
    );
  });
}

// ===============================
// Extract Model Data
// ===============================
async function buildModelData() {
  if (!model) return;

  modelDataCache = [];

  const tree = model.getInstanceTree();
  const root = tree.getRootId();
  const dbIds = [];

  tree.enumNodeChildren(root, function recurse(id) {
    let childCount = 0;
    tree.enumNodeChildren(id, child => {
      childCount++;
      recurse(child);
    });
    if (childCount === 0) dbIds.push(id);
  });

  await new Promise((resolve, reject) => {
    model.getBulkProperties(
      dbIds,
      { propFilter: ["Category","Level","Material","Area","Volume"] },
      rows => {
        rows.forEach(r => {
          const props = {};
          r.properties.forEach(p => {
            props[p.displayName] = p.displayValue;
          });

          modelDataCache.push({
            dbId: r.dbId,
            category: props["Category"] || "",
            level: props["Level"] || "",
            material: props["Material"] || "",
            area: parseFloat(props["Area"]) || 0,
            volume: parseFloat(props["Volume"]) || 0
          });
        });
        resolve();
      },
      reject
    );
  });
}

// ===============================
// Highlight Safe
// ===============================
function highlight(dbIds) {
  const ids = Array.isArray(dbIds)
    ? dbIds.filter(n => Number.isInteger(n) && n > 0)
    : [];

  if (ids.length === 0) {
    viewer.clearSelection();
    viewer.isolate([]);   // NEVER isolate(0)
    viewer.fitToView();
    return;
  }

  viewer.isolate(ids);
  viewer.fitToView(ids);
  viewer.setSelection(ids);
}

// ===============================
// Ask AI
// ===============================
async function askAI(text) {
  const res = await fetch(`${BACKEND}/api/ai`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      text,
      modelData:modelDataCache
    })
  });

  const data = await res.json();
  document.getElementById("aiAnswer").innerText =
    data.answer || "No answer.";

  if (data.dbIds) highlight(data.dbIds);
}

// ===============================
// UI Events
// ===============================
document.getElementById("btnLoad").onclick = async () => {
  const urn = document.getElementById("urnInput").value.trim();
  if (!urn) return alert("Paste URN first.");
  await loadModel(urn);
  await buildModelData();
};

document.getElementById("btnAsk").onclick = async () => {
  const text = document.getElementById("prompt").value.trim();
  if (!text) return;
  await askAI(text);
};

// Auto init
initViewer();
</script>
</body>
</html>
