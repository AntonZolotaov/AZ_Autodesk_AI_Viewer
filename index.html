<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AZ | Autodesk 3D Viewer</title>

<link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.108.0/style.min.css"/>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body,html{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#f8fafc;font-family:Inter,sans-serif}
#viewer-container{width:100%;height:100%;position:relative}
#forgeViewer{width:100%;height:100%;position:absolute;top:0;left:0}
.glass-panel{background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border:1px solid rgba(0,0,0,.05);border-radius:12px}
#ai-panel{position:absolute;top:20px;right:20px;width:320px;max-height:85vh;z-index:20;display:flex;flex-direction:column;gap:12px;padding:16px}
.status-text{font-size:11px;font-weight:500}
</style>
</head>

<body>
<div id="viewer-container">
<div id="ai-panel" class="glass-panel shadow-xl">
<div class="flex justify-between items-center border-b pb-2">
<h3 class="font-bold text-sm">AI BIM Assistant</h3>
<span id="ai-status" class="status-text text-slate-500">Ready</span>
</div>

<div id="ai-response-area" class="hidden text-xs bg-white/50 rounded p-3">
<div id="ai-answer"></div>
</div>

<textarea id="ai-input" class="w-full text-xs p-3 rounded border"
rows="3" placeholder="Ask about quantities..."></textarea>

<div class="flex gap-2">
<button id="btn-ask" class="bg-blue-600 text-white text-xs px-4 py-2 rounded">Ask</button>
<button id="btn-clear" class="text-xs px-3 py-2">Clear</button>
</div>
</div>

<div id="forgeViewer"></div>
</div>

<script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.108.0/viewer3D.min.js"></script>

<script>
// ================== CONFIG ==================
const BACKEND_BASE = "https://revit-viewer-backend.onrender.com";
const AI_URL = `${BACKEND_BASE}/api/ai`;
const TOKEN_URL = `${BACKEND_BASE}/api/auth/token`;
const MODEL_URN = "dXJuOmFkc2sub2JqZWN0czpvcy5vYmplY3Q6YW50b25yZXZpdGJ1Y2tldDIwMjYvYnJ6MDAxLmR3Zng";
const documentId = `urn:${MODEL_URN}`;

let viewer=null;
let modelIndex=null;
let modelIndexed=false;
let cachedToken=null;
let cachedExpiry=0;

// ================== TOKEN ==================
async function fetchToken(){
const res=await fetch(TOKEN_URL);
const data=await res.json();
cachedToken=data.access_token;
cachedExpiry=Date.now()+data.expires_in*1000-60000;
return data;
}
function getAccessToken(cb){
if(cachedToken&&Date.now()<cachedExpiry){cb(cachedToken,3600);}
else fetchToken().then(d=>cb(d.access_token,d.expires_in));
}

// ================== VIEWER ==================
function initViewer(){
const htmlDiv=document.getElementById('forgeViewer');
const options={env:'AutodeskProduction',api:'derivativeV2',getAccessToken};

Autodesk.Viewing.Initializer(options,()=>{
viewer=new Autodesk.Viewing.GuiViewer3D(htmlDiv);
viewer.start();

Autodesk.Viewing.Document.load(documentId,doc=>{
const viewable=doc.getRoot().getDefaultGeometry();
viewer.loadDocumentNode(doc,viewable).then(()=>{
viewer.setBackgroundColor(248,250,252,248,250,252);
viewer.addEventListener(
Autodesk.Viewing.GEOMETRY_LOADED_EVENT,
()=>buildModelIndex()
);
});
});
});
}

// ================== BIM INDEX ==================
function getProp(item,name){
const p=item.properties?.find(x=>x.displayName===name);
return p?p.displayValue:null;
}
function toNumber(v){
if(!v)return 0;
const n=parseFloat(String(v).replace(",","."));
return Number.isFinite(n)?n:0;
}

async function buildModelIndex(){
if(modelIndexed||!viewer)return;
setStatus("Indexing model...","blue");

const tree=viewer.model.getInstanceTree();
const root=tree.getRootId();
const stack=[root];
const ids=[];

while(stack.length){
const id=stack.pop();
ids.push(id);
tree.enumNodeChildren(id,child=>stack.push(child));
}

const wanted=["Category","Level","Base Level","Reference Level",
"Family and Type","Type Name","Area","Volume","Material"];

const batchSize=2000;
const index=[];

for(let i=0;i<ids.length;i+=batchSize){
const batch=ids.slice(i,i+batchSize);
const items=await new Promise((res,rej)=>{
viewer.model.getBulkProperties(batch,wanted,res,rej);
});

for(const item of items){
const level=
getProp(item,"Level")||
getProp(item,"Base Level")||
getProp(item,"Reference Level");

index.push({
dbId:item.dbId,
name:item.name,
category:getProp(item,"Category"),
level:level,
area:toNumber(getProp(item,"Area")),
volume:toNumber(getProp(item,"Volume")),
material:getProp(item,"Material")
});
}
}

modelIndex=index;
modelIndexed=true;
setStatus(`Model indexed (${index.length})`,"green");
}

// ================== ASK AI ==================
async function handleAsk(){
const text=document.getElementById("ai-input").value.trim();
if(!text||!modelIndex)return;

setStatus("Processing...","blue");

const res=await fetch(AI_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text,modelData:modelIndex})
});

const data=await res.json();

document.getElementById("ai-response-area").classList.remove("hidden");
document.getElementById("ai-answer").innerText=data.answer||"No answer";

if(Array.isArray(data.dbIds)&&data.dbIds.length>0){
viewer.isolate(data.dbIds);
viewer.select(data.dbIds);
viewer.fitToView(data.dbIds);
}

setStatus("Ready","gray");
}

// ================== UI ==================
function setStatus(text,color){
const el=document.getElementById("ai-status");
el.innerText=text;
el.className=`status-text text-${color}-600`;
}

document.getElementById("btn-ask").onclick=handleAsk;

document.getElementById("btn-clear").onclick=()=>{
document.getElementById("ai-input").value="";
document.getElementById("ai-response-area").classList.add("hidden");
viewer.isolate(0);
viewer.select([]);
viewer.fitToView();
setStatus("Ready","gray");
};

window.onload=initViewer;
</script>
</body>
</html>
