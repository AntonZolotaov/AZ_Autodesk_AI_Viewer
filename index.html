<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APS Viewer + AI BIM Assistant</title>

  <!-- Autodesk APS Viewer -->
  <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.min.css" type="text/css" />
  <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --bg: #f1f5f9;
      --panel: #ffffff;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --accent: #0891b2;
    }
    body { background: var(--bg); color: #0f172a; font-family: 'Inter', system-ui, sans-serif; }
    .card { background: var(--panel); border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: 12px; }
    .btn {
      display:inline-flex; align-items:center; justify-content:center;
      padding: .6rem 1rem; border-radius: 8px; border: 1px solid var(--border);
      background: white; font-weight: 600; transition: all 0.2s; font-size: 0.875rem;
    }
    .btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: #f0f9ff; }
    .btn-primary{ background: var(--accent); color: white; border-color: transparent; }
    .btn-primary:hover:not(:disabled) { background: #0e7490; color: white; box-shadow: 0 4px 6px -1px rgba(8, 145, 178, 0.4); }
    .btn:disabled{ opacity: .5; cursor: not-allowed; }
    .chip{ font-size: 11px; padding: 2px 10px; border-radius: 999px; border: 1px solid var(--border); background: #f8fafc; color: var(--muted); font-weight: 600; }

    #viewer-container { position: relative; width: 100%; height: calc(100vh - 200px); min-height: 480px; border-radius: 8px; overflow: hidden; background: #262626; }
    #viewer { width: 100%; height: 100%; }

    .viewer-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(15, 23, 42, 0.8); color: white; z-index: 10;
      backdrop-filter: blur(4px); transition: opacity 0.5s;
    }
    .viewer-overlay.hidden { opacity: 0; pointer-events: none; }

    .msg-user{ background:#f1f5f9; border:1px solid var(--border); align-self: flex-end; border-bottom-right-radius: 2px; }
    .msg-ai{ background:#ecfeff; border:1px solid #bae6fd; align-self: flex-start; border-bottom-left-radius: 2px; }
    .scrollbar::-webkit-scrollbar { width: 5px; }
    .scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>

<body class="p-4 md:p-6 lg:overflow-hidden h-screen flex flex-col">
  <div class="max-w-[1800px] mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1 min-h-0">

    <!-- LEFT: Viewer -->
    <div class="lg:col-span-8 card p-4 flex flex-col">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <div id="statusDot" class="w-3 h-3 rounded-full bg-slate-400"></div>
          <h2 class="font-bold text-lg tracking-tight">BIM Engine</h2>
          <span id="viewerStatus" class="chip">Idle</span>
        </div>
        <div class="flex gap-2">
          <button id="btnFit" class="btn h-9 px-4">Fit</button>
          <button id="btnReset" class="btn h-9 px-4">Reset</button>
        </div>
      </div>

      <div id="viewer-container">
        <div id="viewerOverlay" class="viewer-overlay">
          <div class="text-center p-6">
            <div class="w-12 h-12 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <h3 class="text-xl font-bold mb-2">Connecting to BIM Data...</h3>
            <p id="overlayText" class="text-slate-400 text-sm max-w-xs mx-auto">Accessing secure model stream...</p>
          </div>
        </div>
        <div id="viewer"></div>
      </div>

      <div class="mt-4 flex flex-wrap items-center gap-3">
        <span class="chip">Objects: <span id="dataCount" class="font-bold text-cyan-600">0</span></span>
        <span class="chip">Selected: <span id="selCount" class="font-bold text-cyan-600">0</span></span>
      </div>
    </div>

    <!-- RIGHT: AI Assistant Only -->
    <div class="lg:col-span-4 flex flex-col min-h-0">
      <div class="card p-5 flex-1 flex flex-col min-h-0">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-bold flex items-center gap-2 text-sm uppercase text-slate-500">AI Assistant</h3>
          <div class="flex gap-4 items-center">
            <button id="btnClear" class="text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase transition-colors">Clear</button>
            <span class="chip font-mono text-[10px]">v2.8.3</span>
          </div>
        </div>

        <div id="chat" class="flex-1 overflow-y-auto space-y-4 mb-4 scrollbar pr-2 text-sm">
          <div class="p-4 rounded-xl bg-slate-50 border border-slate-100 text-slate-500 text-xs leading-relaxed">
            <b>System Ready</b><br>
            The model is loading. Click <b>Index BIM Metadata</b> to scan properties (category/level/material/area/volume).
          </div>
        </div>

        <div class="space-y-3">
          <button id="btnBuild" class="btn w-full py-3 mb-2 border-dashed border-2 hover:border-cyan-500 bg-slate-50" disabled>
            Index BIM Metadata
          </button>

          <textarea id="prompt" rows="3"
            class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none transition-all resize-none bg-slate-50 shadow-inner"
            placeholder="Ask: Total concrete volume, How many doors, Windows per level..."></textarea>

          <div class="flex gap-2">
            <button id="btnAsk" class="btn btn-primary flex-1" disabled>Ask Assistant</button>
            <button id="btnAskSel" class="btn flex-none w-12" title="Analyze Selection" disabled>
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let viewer = null;
    let modelDataCache = [];
    let isBuilding = false;

    const DEFAULT_URN = "dXJuOmFkc2sub2JqZWN0czpvcy5vYmplY3Q6YW50b25yZXZpdGJ1Y2tldDIwMjYvYnJ6MDAxLmR3Zng";

    const $ = (id) => document.getElementById(id);
    const backendBase = () => "https://revit-viewer-backend.onrender.com";

    function updateStatus(state, colorClass = "bg-slate-400") {
      $("viewerStatus").textContent = state;
      $("statusDot").className = `w-3 h-3 rounded-full animate-pulse ${colorClass}`;
    }

    function pushMsg(role, text) {
      const chat = $("chat");
      const div = document.createElement("div");
      div.className = `max-w-[90%] rounded-2xl px-4 py-3 shadow-sm ${role === "user" ? "msg-user" : "msg-ai"}`;
      div.innerHTML = `<div class="text-[9px] font-black uppercase mb-1 opacity-40">${role === "user" ? "You" : "AI"}</div><div class="leading-relaxed font-medium"></div>`;
      div.querySelector("div.leading-relaxed").textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function safeDbIds(dbIds) {
      return Array.isArray(dbIds) ? dbIds.filter(n => Number.isInteger(n) && n > 0) : [];
    }

    async function getAccessToken(onTokenReady) {
      try {
        const resp = await fetch(`${backendBase()}/api/auth/token`);
        if (!resp.ok) {
          const t = await resp.text().catch(() => "");
          throw new Error(`Token error HTTP ${resp.status}: ${t}`);
        }
        const data = await resp.json();
        onTokenReady(data.access_token, data.expires_in);
      } catch (err) {
        console.error(err);
        updateStatus("Token Error", "bg-red-500");
        $("overlayText").textContent = "Token Error. Check backend /api/auth/token + scopes (viewables:read).";
      }
    }

    function initViewer() {
      return new Promise((resolve, reject) => {
        const options = { env: "AutodeskProduction", getAccessToken };

        Autodesk.Viewing.Initializer(options, () => {
          viewer = new Autodesk.Viewing.GuiViewer3D($("viewer"));
          const code = viewer.start();
          if (code > 0) return reject(new Error("Viewer failed to start"));

          viewer.setTheme("light-theme");

          viewer.addEventListener(Autodesk.Viewing.SELECTION_CHANGED_EVENT, () => {
            $("selCount").textContent = (viewer.getSelection() || []).length;
          });

          resolve();
        });
      });
    }

    async function loadModel(rawUrn) {
      if (!viewer) await initViewer();

      updateStatus("Connecting...", "bg-yellow-500");
      $("overlayText").textContent = "Loading model viewables...";
      $("viewerOverlay").classList.remove("hidden");

      let cleanUrn = String(rawUrn || "").trim();
      if (cleanUrn.startsWith("urn:")) cleanUrn = cleanUrn.substring(4);
      if (!cleanUrn) {
        updateStatus("URN Missing", "bg-red-500");
        $("overlayText").textContent = "URN missing. Provide a base64 URN.";
        return;
      }

      const documentId = "urn:" + cleanUrn;

      // IMPORTANT: attach event BEFORE load, to avoid race condition
      const onTree = () => {
        viewer.removeEventListener(Autodesk.Viewing.OBJECT_TREE_CREATED_EVENT, onTree);

        updateStatus("Ready", "bg-green-500");
        $("viewerOverlay").classList.add("hidden");

        $("btnBuild").disabled = false;
        $("btnBuild").classList.remove("bg-slate-50");
        $("btnBuild").classList.add("bg-cyan-50", "border-cyan-200");

        $("overlayText").textContent = "Ready.";
      };
      viewer.addEventListener(Autodesk.Viewing.OBJECT_TREE_CREATED_EVENT, onTree);

      Autodesk.Viewing.Document.load(
        documentId,
        (doc) => {
          const viewable = doc.getRoot().getDefaultGeometry();
          if (!viewable) {
            updateStatus("No Viewable", "bg-red-500");
            $("overlayText").textContent = "No default geometry. Make sure the URN is translated (SVF/SVF2).";
            return;
          }

          viewer.loadDocumentNode(doc, viewable).catch((e) => {
            console.error(e);
            updateStatus("Load Error", "bg-red-500");
            $("overlayText").textContent = "loadDocumentNode failed. Check console.";
          });
        },
        (errCode, errMsg) => {
          console.error("Document.load failed:", errCode, errMsg);
          updateStatus("Load Error", "bg-red-500");
          $("overlayText").textContent = `Document.load failed (${errCode}). Check URN translation + token scopes.`;
        }
      );
    }

    function pickProp(props, names) {
      if (!Array.isArray(props)) return null;
      const map = new Map();
      for (const p of props) map.set(String(p.displayName || "").toLowerCase(), p.displayValue);
      for (const name of names) {
        const v = map.get(String(name).toLowerCase());
        if (v != null && v !== "") return v;
      }
      return null;
    }

    function asNumber(v) {
      if (v == null) return 0;
      if (typeof v === "number") return Number.isFinite(v) ? v : 0;
      const s = String(v).replace(",", ".").replace(/[^\d.+-eE]/g, "");
      const n = parseFloat(s);
      return Number.isFinite(n) ? n : 0;
    }

    async function buildIndex() {
      if (!viewer || !viewer.model || isBuilding) return;

      const tree = viewer.model.getInstanceTree();
      if (!tree) return pushMsg("ai", "Tree not ready. Try again in 2 seconds.");

      isBuilding = true;
      $("btnBuild").disabled = true;
      $("btnBuild").textContent = "Deep Scan...";
      updateStatus("Indexing...", "bg-cyan-500");

      // Collect nodes with fragments (renderable)
      const ids = [];
      const rootId = tree.getRootId();

      const crawl = (id) => {
        let hasFrag = false;
        tree.enumNodeFragments(id, () => { hasFrag = true; }, false);
        if (hasFrag) ids.push(id);
        tree.enumNodeChildren(id, (childId) => crawl(childId));
      };
      crawl(rootId);

      const propFilter = [
        "Category",
        "Level", "Base Level", "Reference Level", "Schedule Level",
        "Material", "Structural Material",
        "Area", "Host Area Computed",
        "Volume"
      ];

      const chunkSize = 1500;
      const results = [];

      for (let i = 0; i < ids.length; i += chunkSize) {
        const chunk = ids.slice(i, i + chunkSize);

        const rows = await new Promise((resolve, reject) => {
          viewer.model.getBulkProperties(
            chunk,
            { propFilter, ignoreHidden: true },
            resolve,
            reject
          );
        });

        for (const item of rows) {
          const p = item.properties || [];

          const category = pickProp(p, ["Category", "Revit Category"]) || "Other";
          const level = pickProp(p, ["Level", "Base Level", "Schedule Level", "Reference Level"]) || "Unknown";
          const material = pickProp(p, ["Material", "Structural Material"]) || "";
          const area = asNumber(pickProp(p, ["Area", "Host Area Computed"]));
          const volume = asNumber(pickProp(p, ["Volume"]));

          results.push({
            dbId: item.dbId,
            category,
            level,
            material,
            area,
            volume
          });
        }

        $("dataCount").textContent = results.length;
      }

      modelDataCache = results;
      isBuilding = false;

      $("btnBuild").textContent = "Update Index";
      $("btnBuild").disabled = false;
      $("btnAsk").disabled = false;
      $("btnAskSel").disabled = false;

      updateStatus("Ready", "bg-green-500");
      pushMsg("ai", `Indexed ${results.length} elements (category/level/material/area/volume). Now ask: "Total concrete volume", "How many doors", "Windows per level".`);
    }

    async function askAI(isSelection = false) {
      const text = $("prompt").value.trim();
      if (!text) return;

      if (!modelDataCache.length) {
        pushMsg("ai", "Please click 'Index BIM Metadata' first.");
        return;
      }

      const selection = viewer?.getSelection?.() || [];
      const dataSlice = isSelection
        ? modelDataCache.filter(item => selection.includes(item.dbId))
        : modelDataCache;

      pushMsg("user", isSelection ? `${text} (selection: ${selection.length})` : text);
      $("prompt").value = "";

      try {
        updateStatus("Thinking...", "bg-yellow-500");

        const resp = await fetch(`${backendBase()}/api/ai`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, modelData: dataSlice })
        });

        if (!resp.ok) {
          const t = await resp.text().catch(() => "");
          throw new Error(`AI HTTP ${resp.status}: ${t}`);
        }

        const data = await resp.json();
        pushMsg("ai", data.answer || "(no answer)");

        const ids = safeDbIds(data.dbIds);
        if (ids.length) {
          viewer.isolate(ids);
          viewer.fitToView(ids);
          viewer.setSelection(ids);
        } else {
          // no results -> unisolate
          viewer.isolate([]);
        }

        updateStatus("Ready", "bg-green-500");
      } catch (err) {
        console.error(err);
        pushMsg("ai", "Error contacting assistant. Check console / backend logs.");
        updateStatus("Error", "bg-red-500");
      }
    }

    $("btnBuild").onclick = buildIndex;
    $("btnAsk").onclick = () => askAI(false);
    $("btnAskSel").onclick = () => askAI(true);
    $("btnFit").onclick = () => viewer?.fitToView?.();
    $("btnReset").onclick = () => {
      if (!viewer) return;
      viewer.isolate([]);
      viewer.fitToView();
      viewer.setSelection([]);
    };
    $("btnClear").onclick = () => $("chat").innerHTML = "";

    window.onload = async () => {
      try {
        await initViewer();
        setTimeout(() => loadModel(DEFAULT_URN), 300);
      } catch (e) {
        console.error(e);
        updateStatus("Viewer Error", "bg-red-500");
        $("overlayText").textContent = "Viewer failed to start. Check console.";
      }
    };
  </script>
</body>
</html>
