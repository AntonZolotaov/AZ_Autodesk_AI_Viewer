<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZ | BIM AI Viewer</title>

  <link rel="stylesheet"
    href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.108.0/style.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#f8fafc; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    #viewer { position:absolute; inset:0; width: 100%; height: 100%; }

    .glass {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
    }

    #panel {
      position: absolute; top: 20px; right: 20px; width: 360px;
      z-index: 20; padding: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .status { font-size: 12px; font-weight: 600; }
    #response-box { max-height: 280px; overflow-y: auto; }
  </style>
</head>

<body>
  <div id="panel" class="glass">
    <div class="flex justify-between items-center mb-3">
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded bg-blue-600 text-white flex items-center justify-center font-bold text-[10px]">AZ</div>
        <div class="font-bold text-sm text-slate-800">AI BIM Assistant</div>
      </div>
      <div id="status" class="status text-slate-500">Loading…</div>
    </div>

    <div id="hint" class="text-[11px] text-slate-500 mb-3 bg-slate-50 p-2 rounded border border-slate-100">
      Initializing Autodesk Viewer…
    </div>

    <div id="response-box" class="hidden text-xs bg-white border border-slate-100 p-3 rounded-lg mb-3 shadow-sm">
      <div id="answer" class="text-slate-800 leading-relaxed"></div>
    </div>

    <textarea id="input"
      class="w-full text-xs p-3 border border-slate-200 rounded-lg mb-3 focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white/50"
      rows="3"
      placeholder="How many doors? Show me windows. Total wall volume."></textarea>

    <div class="flex gap-2">
      <button id="ask"
        class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-6 py-2 rounded-lg transition-all disabled:opacity-40 disabled:cursor-not-allowed active:scale-95"
        disabled>Ask</button>

      <button id="clear"
        class="bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs px-4 py-2 rounded-lg transition-all border border-slate-200">Clear</button>

      <button id="reset-view"
        class="ml-auto text-slate-400 hover:text-slate-600 transition-colors"
        title="Reset view">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="viewer"></div>

  <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.108.0/viewer3D.min.js"></script>

  <script>
    // ================= CONFIG =================
    const BACKEND = "https://revit-viewer-backend.onrender.com";
    const AI_URL = `${BACKEND}/api/ai`;
    const TOKEN_URL = `${BACKEND}/api/auth/token`;

    const MODEL_URN = "dXJuOmFkc2sub2JqZWN0czpvcy5vYmplY3Q6YW50b25yZXZpdGJ1Y2tldDIwMjYvYnJ6MDAxLmR3Zng";
    const documentId = `urn:${MODEL_URN}`;

    let viewer = null;
    let modelIndex = [];
    let modelReady = false;

    let treeReady = false;
    let geomReady = false;
    let indexingStarted = false;

    // ================= UI =================
    const statusEl = document.getElementById("status");
    const hintEl = document.getElementById("hint");
    const askBtn = document.getElementById("ask");
    const clearBtn = document.getElementById("clear");
    const resetBtn = document.getElementById("reset-view");
    const responseBox = document.getElementById("response-box");
    const answerEl = document.getElementById("answer");
    const inputEl = document.getElementById("input");

    function setStatus(text, color = "slate") {
      statusEl.textContent = text;
      statusEl.className = `status text-${color}-600`;
    }

    // ================= TOKEN =================
    let tokenCache = null, tokenExpire = 0;

    async function getAccessToken(callback) {
      if (tokenCache && Date.now() < tokenExpire) {
        callback(tokenCache, 3600);
        return;
      }
      try {
        const res = await fetch(TOKEN_URL);
        if (!res.ok) throw new Error(`Token error ${res.status}`);
        const data = await res.json();
        tokenCache = data.access_token;
        tokenExpire = Date.now() + (data.expires_in * 1000) - 60000;
        callback(data.access_token, data.expires_in);
      } catch (err) {
        console.error("Token fetch failed", err);
        setStatus("Auth Error", "red");
        hintEl.textContent = "Backend token endpoint failed.";
      }
    }

    // ================= VIEWER =================
    function initViewer() {
      const viewerDiv = document.getElementById("viewer");

      Autodesk.Viewing.Initializer(
        { env: "AutodeskProduction", api: "derivativeV2", getAccessToken },
        () => {
          viewer = new Autodesk.Viewing.GuiViewer3D(viewerDiv);
          const started = viewer.start();
          if (started > 0) {
            setStatus("WebGL Error", "red");
            hintEl.textContent = "WebGL not supported.";
            return;
          }

          Autodesk.Viewing.Document.load(documentId, (doc) => {
            const viewable = doc.getRoot().getDefaultGeometry();

            viewer.loadDocumentNode(doc, viewable).then(() => {
              viewer.setBackgroundColor(248, 250, 252, 248, 250, 252);

              viewer.addEventListener(Autodesk.Viewing.OBJECT_TREE_CREATED_EVENT, () => {
                treeReady = true;
                maybeStartIndexing();
              });

              viewer.addEventListener(Autodesk.Viewing.GEOMETRY_LOADED_EVENT, () => {
                geomReady = true;
                maybeStartIndexing();
              });

              hintEl.textContent = "Loading model…";
              setStatus("Loading…", "slate");
            });

          }, (errCode) => {
            console.error("Document load failed:", errCode);
            setStatus("Load Error", "red");
            hintEl.textContent = "Model load failed.";
          });
        }
      );
    }

    function maybeStartIndexing() {
      if (indexingStarted) return;
      if (!treeReady || !geomReady) return;
      indexingStarted = true;
      buildIndex().catch((e) => {
        console.error(e);
        setStatus("Index Error", "red");
        hintEl.textContent = "Failed to index model.";
      });
    }

    // ================= CORRECT: dbIds with FRAGMENTS =================
    function getDbIdsWithFragments() {
      const tree = viewer.model.getInstanceTree();
      const root = tree.getRootId();

      const all = [];
      // true = recursive enumeration of all descendants
      tree.enumNodeChildren(root, (id) => all.push(id), true);

      const fragIds = [];
      const real = [];

      for (const id of all) {
        fragIds.length = 0;
        tree.getNodeFragmentIds(id, fragIds);
        if (fragIds.length > 0) real.push(id);
      }

      return real;
    }

    // ================= PROPS =================
    function getProp(item, name) {
      const p = item.properties?.find(x => x.displayName === name);
      return p ? p.displayValue : null;
    }

    function toNum(v) {
      if (v == null) return 0;
      const s = String(v).trim();
      if (!s) return 0;

      let t = s.replace(/\s/g, "");
      if (t.includes(",") && t.includes(".")) t = t.replace(/,/g, "");
      else if (t.includes(",") && !t.includes(".")) t = t.replace(",", ".");
      const n = parseFloat(t);
      return Number.isFinite(n) ? n : 0;
    }

    // ================= INDEX =================
    async function buildIndex() {
      setStatus("Indexing…", "blue");
      hintEl.textContent = "Finding real geometry elements…";
      askBtn.disabled = true;

      // Important: build from fragment-bearing nodes
      const dbIds = getDbIdsWithFragments();
      console.log("Geometry elements (fragments):", dbIds.length);

      if (!dbIds.length) {
        setStatus("Index Error", "red");
        hintEl.textContent = "No geometry elements found. (Model may be 2D or empty)";
        return;
      }

      const wantedProps = [
        "Category",
        "Level",
        "Base Level",
        "Reference Level",
        "Area",
        "Volume",
        "Material"
      ];

      const batchSize = 1500;
      modelIndex = [];

      for (let i = 0; i < dbIds.length; i += batchSize) {
        const batch = dbIds.slice(i, i + batchSize);
        const pct = Math.round((Math.min(i + batchSize, dbIds.length) / dbIds.length) * 100);
        setStatus(`Indexing ${pct}%`, "blue");

        const items = await new Promise((res, rej) => {
          viewer.model.getBulkProperties(batch, wantedProps, res, rej);
        });

        for (const item of items) {
          const levelVal =
            getProp(item, "Level") ||
            getProp(item, "Base Level") ||
            getProp(item, "Reference Level") ||
            "Unknown";

          modelIndex.push({
            dbId: item.dbId,
            category: getProp(item, "Category") || "Other",
            level: levelVal,
            area: toNum(getProp(item, "Area")),
            volume: toNum(getProp(item, "Volume")),
            material: getProp(item, "Material") || "N/A"
          });
        }
      }

      modelReady = true;
      setStatus("Ready", "green");
      hintEl.textContent = `Model indexed (${modelIndex.length} elements). Ask a question.`;
      askBtn.disabled = false;
    }

    // ================= ASK =================
    async function ask() {
      if (!modelReady) {
        setStatus("Indexing…", "amber");
        return;
      }
      const queryText = inputEl.value.trim();
      if (!queryText) return;

      setStatus("Analyzing…", "blue");
      askBtn.disabled = true;

      try {
        const response = await fetch(AI_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text: queryText,
            modelData: modelIndex
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data?.error || `HTTP ${response.status}`);

        responseBox.classList.remove("hidden");
        answerEl.textContent = data.answer || "No answer";

        if (Array.isArray(data.dbIds) && data.dbIds.length > 0) {
          viewer.isolate(data.dbIds);
          viewer.select(data.dbIds);
          viewer.fitToView(data.dbIds);
        } else {
          viewer.isolate(0);
          viewer.select([]);
        }

        setStatus("Ready", "green");
      } catch (err) {
        console.error(err);
        responseBox.classList.remove("hidden");
        answerEl.textContent = "Error: AI request failed.";
        setStatus("Error", "red");
      } finally {
        askBtn.disabled = false;
      }
    }

    // ================= EVENTS =================
    askBtn.onclick = ask;

    inputEl.onkeydown = (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        ask();
      }
    };

    clearBtn.onclick = () => {
      inputEl.value = "";
      responseBox.classList.add("hidden");
      if (viewer) {
        viewer.isolate(0);
        viewer.select([]);
        viewer.fitToView();
      }
    };

    resetBtn.onclick = () => {
      if (!viewer) return;
      viewer.isolate(0);
      viewer.select([]);
      viewer.fitToView();
    };

    window.onload = initViewer;
  </script>
</body>
</html>
