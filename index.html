<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZ | Autodesk 3D Viewer</title>

  <!-- Autodesk Viewer CSS -->
  <link rel="stylesheet"
    href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.108.0/style.min.css"
    type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#f8fafc; }
    #viewer-container { position:relative; width:100%; height:100%; }
    #forgeViewer { position:absolute; inset:0; }

    .glass {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 14px;
    }

    #ai-panel{
      position:absolute; top:20px; right:20px;
      width:360px; max-height:85vh;
      z-index:50; pointer-events:auto;
      display:flex; flex-direction:column; gap:10px;
      padding:14px;
      box-shadow: 0 12px 40px rgba(15,23,42,0.10);
    }

    #ai-response-area{
      max-height:320px; overflow:auto;
      white-space:pre-wrap;
    }

    .status-text{ font-size:11px; font-weight:600; }
    .muted{ color:#64748b; }
  </style>
</head>

<body>
  <div id="viewer-container">
    <!-- AI Panel -->
    <div id="ai-panel" class="glass">
      <div class="flex items-center justify-between border-b border-slate-200 pb-2">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-lg bg-blue-600 text-white flex items-center justify-center font-bold text-xs">AZ</div>
          <div class="font-bold text-slate-800 text-sm">AI BIM Assistant</div>
        </div>
        <div id="ai-status" class="status-text muted">Loading…</div>
      </div>

      <div id="ai-hint" class="text-xs muted">
        Indexing model data for accurate counts and totals…
      </div>

      <div id="ai-response-area" class="hidden text-xs text-slate-800 bg-white/60 rounded-lg p-3">
        <div id="ai-answer"></div>
        <div id="ai-model" class="mt-2 text-[11px] muted"></div>
      </div>

      <textarea id="ai-input"
        class="w-full text-xs p-3 rounded-lg border border-slate-200 bg-white/80 focus:outline-none focus:ring-2 focus:ring-blue-400"
        rows="3"
        placeholder="Ask: How many doors? Show me windows. Total wall volume. Windows per level…"></textarea>

      <div class="flex items-center gap-2">
        <button id="btn-ask"
          class="bg-blue-600 text-white text-xs font-bold px-5 py-2 rounded-lg hover:bg-blue-700 active:scale-95 transition disabled:opacity-40 disabled:cursor-not-allowed"
          disabled>
          Ask
        </button>

        <button id="btn-clear"
          class="bg-slate-100 text-slate-700 text-xs px-3 py-2 rounded-lg hover:bg-slate-200 active:scale-95 transition border border-slate-200">
          Clear
        </button>

        <button id="btn-resetview"
          class="ml-auto text-[11px] px-2 py-1 rounded-md border border-slate-200 text-slate-600 hover:bg-slate-50 transition">
          Reset view
        </button>
      </div>

      <select id="ai-prompts"
        class="text-[11px] text-slate-500 bg-transparent border-none focus:ring-0 cursor-pointer hover:text-slate-700 transition-colors">
        <option value="">Quick prompts…</option>
        <option value="How many doors?">How many doors?</option>
        <option value="Show me doors">Show me doors</option>
        <option value="How many windows?">How many windows?</option>
        <option value="Windows per level">Windows per level</option>
        <option value="Total wall volume">Total wall volume</option>
        <option value="Total floor area">Total floor area</option>
        <option value="Total concrete volume">Total concrete volume</option>
      </select>
    </div>

    <!-- Viewer -->
    <div id="forgeViewer"></div>
  </div>

  <!-- Autodesk Viewer JS -->
  <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.108.0/viewer3D.min.js"></script>

  <script>
    // ================== CONFIG ==================
    // Use your backend base URL (Render URL)
    const BACKEND_BASE = "https://revit-viewer-backend.onrender.com";
    const AI_URL = `${BACKEND_BASE}/api/ai`;
    const TOKEN_URL = `${BACKEND_BASE}/api/auth/token`;

    // Your URN (WITHOUT "urn:")
    const MODEL_URN = "dXJuOmFkc2sub2JqZWN0czpvcy5vYmplY3Q6YW50b25yZXZpdGJ1Y2tldDIwMjYvYnJ6MDAxLmR3Zng";
    const documentId = `urn:${MODEL_URN}`;

    // ================== STATE ==================
    let viewer = null;

    let cachedToken = null;
    let cachedExpiryMs = 0;
    let inflightTokenPromise = null;

    let modelIndex = null;
    let modelIndexed = false;

    // ================== UI ==================
    const ui = {
      status: document.getElementById("ai-status"),
      hint: document.getElementById("ai-hint"),
      responseArea: document.getElementById("ai-response-area"),
      answer: document.getElementById("ai-answer"),
      model: document.getElementById("ai-model"),
      input: document.getElementById("ai-input"),
      askBtn: document.getElementById("btn-ask"),
      clearBtn: document.getElementById("btn-clear"),
      resetViewBtn: document.getElementById("btn-resetview"),
      prompts: document.getElementById("ai-prompts"),
    };

    function setStatus(text, tone = "muted") {
      ui.status.textContent = text;
      ui.status.className = "status-text " + (tone === "muted" ? "muted" : "");
      if (tone === "blue") ui.status.className = "status-text text-blue-600";
      if (tone === "green") ui.status.className = "status-text text-green-600";
      if (tone === "amber") ui.status.className = "status-text text-amber-600";
      if (tone === "red") ui.status.className = "status-text text-red-600";
    }

    // ================== AUTH ==================
    async function fetchToken() {
      if (inflightTokenPromise) return inflightTokenPromise;

      inflightTokenPromise = (async () => {
        const res = await fetch(TOKEN_URL);
        if (!res.ok) throw new Error(`Auth failed (${res.status})`);
        const data = await res.json();

        cachedToken = data.access_token;
        cachedExpiryMs = Date.now() + (data.expires_in * 1000) - 60000; // refresh 60s early
        return data;
      })();

      try { return await inflightTokenPromise; }
      finally { inflightTokenPromise = null; }
    }

    function getAccessToken(onTokenReady) {
      if (cachedToken && Date.now() < cachedExpiryMs) {
        onTokenReady(cachedToken, 3600);
        return;
      }

      fetchToken()
        .then(d => onTokenReady(d.access_token, d.expires_in))
        .catch(() => onTokenReady("", 0));
    }

    // ================== VIEWER INIT ==================
    function initViewer() {
      const container = document.getElementById("forgeViewer");
      const options = { env: "AutodeskProduction", api: "derivativeV2", getAccessToken };

      Autodesk.Viewing.Initializer(options, () => {
        viewer = new Autodesk.Viewing.GuiViewer3D(container);
        const started = viewer.start();
        if (started > 0) {
          setStatus("WebGL not supported", "red");
          return;
        }

        Autodesk.Viewing.Document.load(
          documentId,
          (doc) => {
            const viewable = doc.getRoot().getDefaultGeometry();
            viewer.loadDocumentNode(doc, viewable).then(() => {
              viewer.setBackgroundColor(248, 250, 252, 248, 250, 252);

              // Start indexing when geometry is ready
              viewer.addEventListener(Autodesk.Viewing.GEOMETRY_LOADED_EVENT, () => {
                buildModelIndex().catch((e) => {
                  console.error(e);
                  setStatus("Indexing failed", "red");
                  ui.hint.textContent = "Could not read model properties.";
                });
              });
            });
          },
          (code, msg) => {
            console.error("Document load error:", code, msg);
            setStatus("Model load failed", "red");
          }
        );
      });
    }

    // ================== BIM INDEXING ==================
    function getProp(item, displayName) {
      const p = item.properties?.find(x => x.displayName === displayName);
      return p ? p.displayValue : null;
    }

    function toNumberOrNull(v) {
      if (v == null) return null;
      const n = typeof v === "number" ? v : parseFloat(String(v).replace(",", "."));
      return Number.isFinite(n) ? n : null;
    }

    async function getAllDbIds() {
      const tree = viewer.model.getInstanceTree();
      const rootId = tree.getRootId();
      const ids = [];
      const stack = [rootId];

      while (stack.length) {
        const id = stack.pop();
        ids.push(id);
        tree.enumNodeChildren(id, (child) => stack.push(child));
      }
      return ids;
    }

    async function buildModelIndex() {
      if (!viewer || modelIndexed) return;

      ui.askBtn.disabled = true;
      setStatus("Indexing…", "blue");
      ui.hint.textContent = "Converting BIM → JSON (this may take a bit on large models).";

      const wanted = [
        "Category",
        "Level",
        "Base Level",
        "Reference Level",
        "Family and Type",
        "Type Name",
        "Area",
        "Volume",
        "Material",
      ];

      const dbIds = await getAllDbIds();
      const batchSize = 2000;

      const index = [];

      for (let i = 0; i < dbIds.length; i += batchSize) {
        const batch = dbIds.slice(i, i + batchSize);

        const items = await new Promise((resolve, reject) => {
          viewer.model.getBulkProperties(batch, wanted, resolve, reject);
        });

        for (const item of items) {
          const level =
            getProp(item, "Level") ??
            getProp(item, "Base Level") ??
            getProp(item, "Reference Level") ??
            null;

          index.push({
            dbId: item.dbId,
            name: item.name ?? null,
            category: getProp(item, "Category"),
            level,
            familyType: getProp(item, "Family and Type") ?? getProp(item, "Type Name"),
            area: toNumberOrNull(getProp(item, "Area")),
            volume: toNumberOrNull(getProp(item, "Volume")),
            material: getProp(item, "Material"),
          });
        }

        // Optional: update status while indexing
        if (i % (batchSize * 5) === 0) {
          setStatus(`Indexing… ${Math.min(i + batchSize, dbIds.length)}/${dbIds.length}`, "blue");
        }
      }

      modelIndex = index;
      modelIndexed = true;

      setStatus(`Ready`, "green");
      ui.hint.textContent = `Model indexed (${index.length} elements). Ask a question.`;
      ui.askBtn.disabled = false;
    }

    // ================== ASK AI ==================
    async function askAi() {
      const text = ui.input.value.trim();
      if (!text) return;

      if (!modelIndexed || !Array.isArray(modelIndex)) {
        setStatus("Model indexing…", "amber");
        ui.hint.textContent = "Please wait until indexing completes.";
        return;
      }

      ui.askBtn.disabled = true;
      setStatus("Thinking…", "blue");

      try {
        const res = await fetch(AI_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text,
            modelData: modelIndex
          })
        });

        const data = await res.json();

        ui.responseArea.classList.remove("hidden");
        ui.answer.textContent = data.answer || "(no answer)";
        ui.model.textContent = data.model ? `Model: ${data.model}` : "";

        // Highlight dbIds
        if (Array.isArray(data.dbIds) && data.dbIds.length > 0 && viewer) {
          viewer.isolate(data.dbIds);
          viewer.select(data.dbIds);
          viewer.fitToView(data.dbIds);
        }

        setStatus("Ready", "green");
      } catch (e) {
        console.error(e);
        setStatus("Server error", "red");
      } finally {
        ui.askBtn.disabled = false;
      }
    }

    // ================== BUTTONS ==================
    ui.askBtn.addEventListener("click", askAi);

    ui.clearBtn.addEventListener("click", () => {
      ui.input.value = "";
      ui.responseArea.classList.add("hidden");
      ui.answer.textContent = "";
      ui.model.textContent = "";
      setStatus(modelIndexed ? "Ready" : "Loading…", modelIndexed ? "green" : "muted");

      if (viewer) {
        viewer.isolate(0);
        viewer.select([]);
        viewer.fitToView();
      }
    });

    ui.resetViewBtn.addEventListener("click", () => {
      if (!viewer) return;
      viewer.isolate(0);
      viewer.select([]);
      viewer.fitToView();
    });

    ui.prompts.addEventListener("change", (e) => {
      const val = e.target.value;
      if (val) ui.input.value = val;
      ui.prompts.value = "";
    });

    ui.input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        askAi();
      }
    });

    // ================== START ==================
    window.addEventListener("load", () => {
      setStatus("Loading…", "muted");
      initViewer();
    });
  </script>
</body>
</html>
