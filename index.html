<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AZ | BIM AI Viewer</title>

<link rel="stylesheet"
href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.108.0/style.min.css" />
<script src="https://cdn.tailwindcss.com"></script>

<style>
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#f8fafc}
#viewer{position:absolute;inset:0}
#panel{
position:absolute;top:20px;right:20px;width:360px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(12px);
border-radius:14px;
padding:16px;
z-index:20;
box-shadow:0 12px 40px rgba(0,0,0,.12);
}
.status{font-size:12px;font-weight:600}
</style>
</head>

<body>

<div id="panel">
<div class="flex justify-between items-center mb-2">
<div class="font-bold text-sm">AI BIM Assistant</div>
<div id="status" class="status text-slate-500">Loading...</div>
</div>

<div id="hint" class="text-xs text-slate-500 mb-2">
Indexing BIM model...
</div>

<div id="response" class="hidden text-xs bg-slate-50 p-3 rounded mb-2">
<div id="answer"></div>
</div>

<textarea id="input"
class="w-full text-xs p-3 border rounded mb-2"
rows="3"
placeholder="How many doors? Show me windows. Total wall volume."></textarea>

<div class="flex gap-2">
<button id="ask"
class="bg-blue-600 text-white text-xs px-4 py-2 rounded disabled:opacity-40"
disabled>Ask</button>

<button id="clear"
class="bg-slate-100 text-xs px-3 py-2 rounded">Clear</button>
</div>
</div>

<div id="viewer"></div>

<script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.108.0/viewer3D.min.js"></script>

<script>
// ================= CONFIG =================
const BACKEND = "https://revit-viewer-backend.onrender.com";
const AI_URL = `${BACKEND}/api/ai`;
const TOKEN_URL = `${BACKEND}/api/auth/token`;

const MODEL_URN = "dXJuOmFkc2sub2JqZWN0czpvcy5vYmplY3Q6YW50b25yZXZpdGJ1Y2tldDIwMjYvYnJ6MDAxLmR3Zng";
const documentId = `urn:${MODEL_URN}`;

let viewer;
let modelIndex = [];
let modelReady = false;

// ================= UI =================
const statusEl = document.getElementById("status");
const hintEl = document.getElementById("hint");
const askBtn = document.getElementById("ask");
const responseBox = document.getElementById("response");
const answerEl = document.getElementById("answer");

function setStatus(text,color="slate"){
statusEl.textContent=text;
statusEl.className=`status text-${color}-600`;
}

// ================= TOKEN =================
let tokenCache=null, tokenExpire=0;

async function getAccessToken(callback){
if(tokenCache && Date.now()<tokenExpire){
callback(tokenCache,3600);
return;
}
const res=await fetch(TOKEN_URL);
const data=await res.json();
tokenCache=data.access_token;
tokenExpire=Date.now()+data.expires_in*1000-60000;
callback(data.access_token,data.expires_in);
}

// ================= VIEWER INIT =================
function initViewer(){
Autodesk.Viewing.Initializer(
{ env:"AutodeskProduction", api:"derivativeV2", getAccessToken },
()=>{
viewer=new Autodesk.Viewing.GuiViewer3D(document.getElementById("viewer"));
viewer.start();

Autodesk.Viewing.Document.load(documentId,(doc)=>{
const viewable=doc.getRoot().getDefaultGeometry();
viewer.loadDocumentNode(doc,viewable).then(()=>{
viewer.setBackgroundColor(248,250,252,248,250,252);

viewer.addEventListener(
Autodesk.Viewing.GEOMETRY_LOADED_EVENT,
()=>buildIndex()
);
});
});
});
}

// ================= CORRECT LEAF WALK =================
function getLeafDbIds(){
return new Promise(resolve=>{
const tree=viewer.model.getInstanceTree();
const root=tree.getRootId();
const leaves=[];

function walk(id){
let childCount=0;

tree.enumNodeChildren(id,(child)=>{
childCount++;
walk(child);
});

if(childCount===0){
leaves.push(id);
}
}

walk(root);
resolve(leaves);
});
}

// ================= PROPERTY HELPERS =================
function getProp(item,name){
const p=item.properties?.find(x=>x.displayName===name);
return p?p.displayValue:null;
}

function toNum(v){
if(!v)return 0;
const n=parseFloat(String(v).replace(",","."));
return Number.isFinite(n)?n:0;
}

// ================= BUILD INDEX =================
async function buildIndex(){
setStatus("Indexing...","blue");
askBtn.disabled=true;

const dbIds=await getLeafDbIds();
console.log("Leaf elements:",dbIds.length);

const wanted=[
"Category",
"Level",
"Base Level",
"Reference Level",
"Area",
"Volume",
"Material"
];

const batchSize=2000;

for(let i=0;i<dbIds.length;i+=batchSize){
const batch=dbIds.slice(i,i+batchSize);

const items=await new Promise((res,rej)=>{
viewer.model.getBulkProperties(batch,wanted,res,rej);
});

for(const item of items){
const level=
getProp(item,"Level")||
getProp(item,"Base Level")||
getProp(item,"Reference Level");

modelIndex.push({
dbId:item.dbId,
category:getProp(item,"Category"),
level:level,
area:toNum(getProp(item,"Area")),
volume:toNum(getProp(item,"Volume")),
material:getProp(item,"Material")
});
}
}

modelReady=true;
setStatus("Ready","green");
hintEl.textContent=`Model indexed (${modelIndex.length} elements). Ask a question.`;
askBtn.disabled=false;
}

// ================= ASK =================
async function ask(){
if(!modelReady)return;

const text=document.getElementById("input").value.trim();
if(!text)return;

setStatus("Thinking...","blue");

const res=await fetch(AI_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text,modelData:modelIndex})
});

const data=await res.json();

responseBox.classList.remove("hidden");
answerEl.textContent=data.answer||"No answer";

if(Array.isArray(data.dbIds)&&data.dbIds.length>0){
viewer.isolate(data.dbIds);
viewer.select(data.dbIds);
viewer.fitToView(data.dbIds);
}

setStatus("Ready","green");
}

// ================= BUTTONS =================
askBtn.onclick=ask;

document.getElementById("clear").onclick=()=>{
document.getElementById("input").value="";
responseBox.classList.add("hidden");
viewer.isolate(0);
viewer.select([]);
viewer.fitToView();
};

// ================= START =================
window.onload=initViewer;
</script>
</body>
</html>
